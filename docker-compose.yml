version: '3.8'

services:
  bot:
    build: .
    container_name: s1-affiliate-bot
    restart: unless-stopped
    ports:
      - "3300:3300"
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - s1-net

  db-init:
    image: postgres:16-alpine
    volumes:
      - ./src/db/schema.sql:/schema.sql:ro
    env_file:
      - .env
    entrypoint: >
      sh -c "
        until pg_isready -h $${PGHOST:-43.160.251.119} -p 5432; do sleep 1; done;
        PGPASSWORD=$${PGPASSWORD} psql $${DATABASE_URL} -f /schema.sql
      "
    networks:
      - s1-net

networks:
  s1-net:
    driver: bridge
